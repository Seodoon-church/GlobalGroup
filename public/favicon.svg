<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2d4a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a962"/>
      <stop offset="100%" style="stop-color:#a88a3d"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Hexagon outline (quartz/crystal) -->
  <polygon points="32,8 52,18 52,38 32,48 12,38 12,18" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  <!-- G letter -->
  <text x="32" y="43" font-family="Georgia,serif" font-size="36" font-weight="700" fill="url(#gold)" text-anchor="middle">G</text>
  <!-- Small hexagon accent -->
  <polygon points="48,10 54,13.5 54,20.5 48,24 42,20.5 42,13.5" fill="none" stroke="#c9a962" stroke-width="1.5" opacity="0.5"/>
  <circle cx="48" cy="17" r="2" fill="#c9a962" opacity="0.6"/>
</svg>
